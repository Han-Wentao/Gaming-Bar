server:
  port: 8080

spring:
  config:
    import: optional:file:./.env.local.properties
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/gamingbar?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
    username: ${DB_USERNAME:gamingbar}
    password: ${DB_PASSWORD:gamingbar}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    property-naming-strategy: SNAKE_CASE
    time-zone: Asia/Shanghai
  mvc:
    format:
      date-time: yyyy-MM-dd HH:mm:ss
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3s

mybatis:
  configuration:
    map-underscore-to-camel-case: true

app:
  cache:
    provider: ${APP_CACHE_PROVIDER:redis}
  jwt:
    secret: ${APP_JWT_SECRET}
    expire-seconds: 604800
    refresh-expire-seconds: 2592000
  sms:
    provider: ${APP_SMS_PROVIDER:mock}
    expire-seconds: 300
    resend-interval-seconds: 60
    send-limit-window-seconds: 300
    send-limit-max-times: 5
  security:
    login-fail-window-seconds: 1800
    login-fail-max-times: 5
    trust-forwarded-client-ip: false
  room:
    hot-cache-seconds: 30
    online-cache-seconds: 7200
  websocket:
    allowed-origin-patterns: ${APP_WS_ALLOWED_ORIGINS:*}
    heartbeat-timeout-ms: 60000
    heartbeat-check-ms: 30000
    ticket-expire-seconds: 30
