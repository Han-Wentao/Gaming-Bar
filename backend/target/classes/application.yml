server:
  port: 8080

spring:
  config:
    import: optional:file:./.env.local.properties
  datasource:
    url: jdbc:h2:mem:gamingbar;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;NON_KEYWORDS=USER
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    property-naming-strategy: SNAKE_CASE
    time-zone: Asia/Shanghai
  mvc:
    format:
      date-time: yyyy-MM-dd HH:mm:ss

mybatis:
  configuration:
    map-underscore-to-camel-case: true

app:
  jwt:
    secret: ${APP_JWT_SECRET}
    expire-seconds: 604800
  sms:
    expire-seconds: 300
    resend-interval-seconds: 60
